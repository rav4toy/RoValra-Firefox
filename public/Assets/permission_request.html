<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>RoValra - Permission Request</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #1e1e2e;
      color: #cdd6f4;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 24px;
    }
    .card {
      background: #313244;
      border-radius: 12px;
      padding: 28px 32px;
      max-width: 380px;
      width: 100%;
      text-align: center;
      box-shadow: 0 8px 32px rgba(0,0,0,0.4);
    }
    .icon { font-size: 40px; margin-bottom: 16px; }
    h2 { font-size: 18px; font-weight: 600; margin-bottom: 10px; color: #cba6f7; }
    p { font-size: 14px; color: #a6adc8; line-height: 1.5; margin-bottom: 22px; }
    .perm-name {
      display: inline-block;
      background: #45475a;
      border-radius: 6px;
      padding: 3px 10px;
      font-family: monospace;
      font-size: 13px;
      color: #89dceb;
      margin-bottom: 20px;
    }
    .btn {
      display: block;
      width: 100%;
      padding: 11px 0;
      border-radius: 8px;
      border: none;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.15s;
    }
    .btn:hover { opacity: 0.85; }
    .btn-allow { background: #a6e3a1; color: #1e1e2e; margin-bottom: 10px; }
    .btn-deny  { background: #45475a; color: #cdd6f4; }
    .status { margin-top: 14px; font-size: 13px; color: #a6adc8; min-height: 18px; }
  </style>
</head>
<body>
  <div class="card">
    <div class="icon">🔐</div>
    <h2>Permission Required</h2>
    <p>RoValra needs an additional browser permission to enable this feature.</p>
    <div class="perm-name" id="perm-label">...</div>
    <button class="btn btn-allow" id="btn-allow">Grant Permission</button>
    <button class="btn btn-deny"  id="btn-deny">Cancel</button>
    <div class="status" id="status"></div>
  </div>
  <script src="permission_request.js"></script>
</body>
</html>
