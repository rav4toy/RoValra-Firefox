<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>RoValra - Permission Request</title>
  <style>
    body { font-family: sans-serif; background: #1a1a2e; color: #eee; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; }
    .card { background: #16213e; border-radius: 12px; padding: 32px; max-width: 360px; text-align: center; box-shadow: 0 4px 24px rgba(0,0,0,0.5); }
    .logo { font-size: 1.5rem; font-weight: bold; color: #e94560; margin-bottom: 12px; }
    p { margin: 8px 0 20px; font-size: 0.95rem; color: #ccc; }
    .perm { background: #0f3460; border-radius: 8px; padding: 8px 16px; margin-bottom: 20px; font-weight: bold; color: #fff; }
    button { border: none; border-radius: 8px; padding: 10px 28px; font-size: 1rem; cursor: pointer; margin: 0 6px; }
    #grantBtn { background: #e94560; color: #fff; }
    #denyBtn  { background: #333; color: #ccc; }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">RoValra</div>
    <p>This feature needs additional permission access:</p>
    <div class="perm" id="permName">…</div>
    <ul id="permList" style="display:none; text-align:left; margin:0 0 20px 0; padding-left: 22px; color:#ddd;"></ul>
    <p>Do you want to grant this permission?</p>
    <button id="grantBtn">Grant</button>
    <button id="denyBtn">Deny</button>
  </div>
  <script src="permission_request.js"></script>
</body>
</html>
